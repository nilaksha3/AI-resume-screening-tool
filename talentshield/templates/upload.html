    <style>

        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap');

        :root {
            --primary-color: #0A1128;

            width: var(--sidebar-width);
            padding: var(--header-height) 24px 40px;
            position: fixed;
            height: 100%;
            left: -280px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 1000;
            border-right: 1px solid rgba(18, 130, 162, 0.2);
            backdrop-filter: blur(10px);

        .sidebar.active {
            left: 0;
        }

        .logo {
            color: var(--text-color);
            font-size: 28px;
            font-weight: 700;
            position: fixed;
            top: 0;
            left: -280px;
            width: var(--sidebar-width);
            height: var(--header-height);
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--primary-color);
            z-index: 1001;
            letter-spacing: 0.5px;
            border-bottom: 1px solid rgba(18, 130, 162, 0.2);
            text-shadow: 0 0 15px var(--accent-glow);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .sidebar:hover .logo,
        .sidebar.active .logo {
            left: 0;
        }

        .sidebar-toggle {
            position: absolute;
            right: -16px;
            top: calc(var(--header-height) + 20px);
            background: var(--accent-color);
            border: none;
            color: var(--text-color);

            height: 32px;

            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;

            background: var(--accent-glow);
            box-shadow: 0 0 20px rgba(18, 130, 162, 0.8);
        }

        .nav-item {
            display: flex;
            align-items: center;
            color: var(--text-color);
            text-decoration: none;
            padding: 16px 20px;
            margin: 4px 0;
            border-radius: 12px;
            transition: all 0.3s ease;
            font-size: 15px;
            font-weight: 500;
            letter-spacing: 0.3px;
            border: 1px solid transparent;
        }

        .nav-item:hover {
            background: rgba(18, 130, 162, 0.1);
            border: 1px solid rgba(18, 130, 162, 0.2);
            box-shadow: 0 0 15px rgba(18, 130, 162, 0.2);

            text-align: center;
        }

        .main-content {
            margin-left: 0;
            padding: var(--header-height) 40px 40px;
            min-height: 100vh;
            background: var(--background-color);
            position: relative;
            transition: margin-left 0.3s ease;

        .sidebar:hover + .main-content,
        .main-content.expanded {
            margin-left: var(--sidebar-width);
        }

        .upload-container {
            max-width: 800px;
            margin: 0 auto;
            padding: 40px;
            background: var(--card-bg);
            border-radius: 16px;
            border: 1px solid rgba(18, 130, 162, 0.2);

        .upload-header {
            margin-bottom: 32px;
        }

        .upload-header h1 {
            font-size: 32px;
            background: linear-gradient(135deg, #FEFCFB, #1282A2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 16px;

        .drop-zone {
            border: 2px dashed rgba(18, 130, 162, 0.4);
            border-radius: 12px;
            padding: 40px;
            text-align: center;
            transition: all 0.3s ease;

        .drop-zone:hover {
            border-color: var(--accent-glow);
            background: rgba(18, 130, 162, 0.1);

        .drop-zone i {
            font-size: 48px;

            margin-bottom: 16px;
        }

        .drop-zone p {

        }

        .file-list {

        .file-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px;
            background: rgba(1, 22, 39, 0.8);
            border-radius: 8px;
            margin-bottom: 8px;
        }

        .file-item i {
            margin-right: 12px;

        }

        .remove-btn {

            border: none;
            color: var(--accent-glow);

            color: var(--text-color);
            padding: 14px 28px;
            border: none;
            border-radius: 8px;

            background: var(--accent-color);
            color: var(--text-color);
            padding: 6px 12px;
            border: none;
            border-radius: 4px;
            font-size: 12px;
            cursor: pointer;
            margin-left: 10px;
            transition: all 0.3s ease;
        }

        .view-pdf-button:hover {

</head>

    <script>
        class ResumeAnalyzer {
            constructor() {
                // Industry-specific keywords
                this.industryKeywords = {
                    software: [
                        'software', 'development', 'programming', 'code', 
                        'developer', 'engineer', 'python', 'javascript', 
                        'react', 'node.js', 'api', 'database', 
                        'agile', 'cloud', 'backend', 'frontend', 
                        'full-stack', 'microservices', 'ci/cd'
                    ],
                    marketing: [
                        'marketing', 'digital', 'social media', 'content', 
                        'strategy', 'campaign', 'seo', 'analytics', 
                        'brand', 'communication', 'promotion', 'advertising'
                    ],
                    design: [
                        'design', 'ui', 'ux', 'graphic', 'creative', 
                        'adobe', 'figma', 'prototype', 'visual', 
                        'branding', 'typography', 'illustration'
                    ],
                    general: [
                        'leadership', 'communication', 'teamwork', 
                        'problem-solving', 'time management', 
                        'organization', 'adaptability', 'innovation'
                    ]
                };
            }
        
            // Identify keywords relevant to a specific position
            getPositionKeywords(position) {
                const positionLower = position.toLowerCase();
                let keywords = [...this.industryKeywords.general];
        
                // Software-related positions
                if (positionLower.includes('software') || 
                    positionLower.includes('developer') || 
                    positionLower.includes('engineer')) {
                    keywords = [...keywords, ...this.industryKeywords.software];
                }
                
                // Marketing-related positions
                if (positionLower.includes('marketing') || 
                    positionLower.includes('digital') || 
                    positionLower.includes('brand')) {
                    keywords = [...keywords, ...this.industryKeywords.marketing];
                }
                
                // Design-related positions
                if (positionLower.includes('design') || 
                    positionLower.includes('ui') || 
                    positionLower.includes('ux')) {
                    keywords = [...keywords, ...this.industryKeywords.design];
                }
        
                // Remove duplicates
                return [...new Set(keywords)];
            }
        
            // Analyze resume text
            analyzeResume(resumeText, position) {
                // Validate inputs
                if (!resumeText || !position) {
                    return this.generateFallbackReport(position);
                }
        
                const resumeLower = resumeText.toLowerCase();
                const positionKeywords = this.getPositionKeywords(position);
        
                // Match keywords
                const matchedKeywords = positionKeywords.filter(keyword => 
                    resumeLower.includes(keyword.toLowerCase())
                );
        
                // Calculate score
                const keywordMatchScore = (matchedKeywords.length / positionKeywords.length) * 100;
                const score = Math.round(Math.max(40, Math.min(keywordMatchScore, 95)));
        
                // Identify missing keywords
                const missingKeywords = positionKeywords.filter(k => 
                    !matchedKeywords.includes(k)
                ).slice(0, 10);  // Limit to top 10 missing keywords
        
                // Generate feedback
                const feedback = this.generateFeedback(score, matchedKeywords, positionKeywords);
        
                return {
                    score: score,
                    feedback: feedback,
                    keywordMatches: matchedKeywords,
                    missingKeywords: missingKeywords,
                    improvedContent: this.generateImprovementSuggestions(position, resumeText, missingKeywords)
                };
            }
        
            // Generate feedback based on score
            generateFeedback(score, matchedKeywords, allKeywords) {
                let feedback = `Your resume shows a ${score}% match for the position. `;
                
                if (score >= 80) {
                    feedback += "Excellent keyword alignment! Your resume strongly reflects the job requirements.";
                } else if (score >= 60) {
                    feedback += "Good keyword coverage, but there's room for improvement.";
                } else {
                    feedback += "Significant opportunities to better align your resume with the job description.";
                }
        
                feedback += ` You matched ${matchedKeywords.length} out of ${allKeywords.length} key terms.`;
                return feedback;
            }
        
            // Generate improvement suggestions
            generateImprovementSuggestions(position, resumeText, missingKeywords) {
                const suggestions = [
                    `Tailor your resume more specifically to the ${position} role.`,
                    "Use more industry-specific terminology.",
                    "Highlight achievements with quantifiable metrics.",
                    "Ensure your most relevant skills are prominently displayed."
                ];
        
                if (missingKeywords.length > 0) {
                    suggestions.push(`Consider incorporating keywords like: ${missingKeywords.slice(0, 5).join(', ')}.`);
                }
        
                if (resumeText.length < 1500) {
                    suggestions.push("Your resume appears brief. Consider adding more detailed information about your experiences and skills.");
                }
        
                return suggestions.join(" ");
            }
        
            // Fallback method for when analysis can't be performed
            generateFallbackReport(position) {
                return {
                    score: 50,
                    feedback: `Unable to perform detailed analysis for ${position || 'the position'}.`,
                    keywordMatches: [],
                    missingKeywords: [
                        "Comprehensive Analysis",
                        "Keyword Matching",
                        "Content Evaluation"
                    ],
                    improvedContent: `Analysis could not be completed. 
        Possible reasons:
        - Resume text extraction failed
        - Insufficient resume content
        - Unrecognized position
        
        Recommendations:
        - Ensure resume is a clear, text-based PDF
        - Double-check file upload
        - Provide a more specific job position`
                };
            }
        }
        
        // Function to use the analyzer
        async function getATSScore(resumeDataUrl, position) {
            try {
                // Extract text from PDF using PDF.js
                const resumeText = await extractTextFromPDF(resumeDataUrl);
                
                // Create analyzer and analyze resume
                const analyzer = new ResumeAnalyzer();
                const result = analyzer.analyzeResume(resumeText, position);
                
                return result;
            } catch (error) {
                console.error("Resume analysis error:", error);
                
                // Create fallback analyzer for error case
                const fallbackAnalyzer = new ResumeAnalyzer();
                return fallbackAnalyzer.generateFallbackReport(position);
            }
        }
        
        // PDF text extraction function (assumes PDF.js is available)
        async function extractTextFromPDF(dataUrl) {
            return new Promise((resolve, reject) => {
                if (!pdfjsLib) {
                    reject(new Error("PDF.js library not loaded"));
                    return;
                }
        
                const loadingTask = pdfjsLib.getDocument(dataUrl);
                
                loadingTask.promise.then(async (pdf) => {
                    let fullText = '';
                    
                    // Check if PDF has pages
                    if (pdf.numPages === 0) {
                        reject(new Error("No pages found in the PDF"));
                        return;
                    }
                    
                    // Extract text from all pages
                    for (let pageNum = 1; pageNum <= pdf.numPages; pageNum++) {
                        const page = await pdf.getPage(pageNum);
                        const textContent = await page.getTextContent();
                        
                        // Concatenate text from the page
                        const pageText = textContent.items.map(item => item.str).join(' ');
                        fullText += pageText + '\n';
                    }
                    
                    // Validate extracted text
                    if (fullText.trim().length < 10) {
                        reject(new Error("Extracted text is too short or empty"));
                        return;
                    }
                    
                    resolve(fullText);
                }).catch(error => {
                    console.error("PDF parsing error:", error);
                    reject(error);
                });
            });
        }
        // Sidebar toggle functionality
        function toggleSidebar() {
            const sidebar = document.querySelector('.sidebar');
            const mainContent = document.querySelector('.main-content');

            sidebar.classList.toggle('active');
            mainContent.classList.toggle('expanded');
        }

        document.addEventListener('DOMContentLoaded', function() {
            // Get DOM elements
            const dropZone = document.querySelector('.drop-zone');
            const fileInput = document.getElementById('file-input');
            const fileList = document.getElementById('file-list');
            const processButton = document.getElementById('process-button');
            
            // Initialize storage for uploaded files
            window.uploadedFiles = {};
            
            // Initialize localStorage if not already set
            if (!localStorage.getItem('resumeUploads')) {
                localStorage.setItem('resumeUploads', JSON.stringify([]));
            }
            
            // Handle drag and drop
            dropZone.addEventListener('dragover', (e) => {
                e.preventDefault();
                dropZone.style.borderColor = 'var(--accent-glow)';
            });

            dropZone.addEventListener('dragleave', (e) => {
                e.preventDefault();
                dropZone.style.borderColor = '';
            });

            dropZone.addEventListener('drop', (e) => {
                e.preventDefault();
                const files = e.dataTransfer.files;
                handleFiles(files);
            });

            fileInput.addEventListener('change', (e) => {
                handleFiles(e.target.files);
            });
            
            // Handle file selection
            function handleFiles(files) {
                Array.from(files).forEach(file => {
                    if (file.type === 'application/pdf') {
                        // Read file as data URL first
                        const reader = new FileReader();
                        reader.onload = function(e) {
                            // Store file and its data URL temporarily
                            window.uploadedFiles[file.name] = {
                                file: file,
                                dataUrl: e.target.result
                            };
                            
                            // Add to displayed list
                            const fileItem = document.createElement('div');
                            fileItem.className = 'file-item';
                            fileItem.innerHTML = `
                                <div>
                                    <i class="fas fa-file-pdf"></i>
                                    <span>${file.name}</span>
                                </div>
                                <div>
                                    <button class="view-pdf-button" onclick="viewPdf('${file.name}')">Preview</button>
                                    <button class="remove-btn" onclick="removeFile(this, '${file.name}')">×</button>
                                </div>
                            `;
                            fileList.appendChild(fileItem);
                        };
                        reader.readAsDataURL(file);
                    } else {
                        alert('Only PDF files are allowed.');
                    }
                });
            }
            
            // Function to preview PDF
            window.viewPdf = function(fileName) {
                const fileData = window.uploadedFiles[fileName];
                if (fileData && fileData.dataUrl) {
                    window.open(fileData.dataUrl, '_blank');
                }
            };
            
            // Function to remove a file from the list
            window.removeFile = function(button, fileName) {
                const fileItem = button.closest('.file-item');
                fileList.removeChild(fileItem);
                
                // Remove from temporary storage
                if (window.uploadedFiles[fileName]) {
                    delete window.uploadedFiles[fileName];
                }
            };
            
           // Modify your process button click handler to include ATS scoring
processButton.addEventListener('click', async function() {
    const fileNames = Object.keys(window.uploadedFiles);
    
    if (fileNames.length === 0) {
        alert('Please select at least one file to upload.');
        return;
    }
    
    // Show loading state
    processButton.disabled = true;
    processButton.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Processing...';
    
    try {
        // Process each file
        // Ask for position once before looping through files
         const position = prompt("What position are you applying for?", "");

        if (!position) {
            alert("Position is required to continue.");
            return;
    }

    for (const fileName of fileNames) {
         const fileData = window.uploadedFiles[fileName];

        if (fileData) {
            console.log(`Processing ${fileName} for position: ${position}`);

                
                // Show analyzing message
                const processingMessage = document.createElement('div');
                processingMessage.id = 'processing-message';
                processingMessage.style.marginTop = '20px';
                processingMessage.style.textAlign = 'center';
                processingMessage.innerHTML = `
                    <i class="fas fa-cog fa-spin" style="color: var(--accent-glow); font-size: 24px; margin-bottom: 10px;"></i>
                    <p>Analyzing resume for ${position} position...</p>
                `;
                document.querySelector('.upload-container').appendChild(processingMessage);
                
                try {
                    // Get ATS score using Claude API
                    const atsResult = await getATSScore(fileData.dataUrl, position);
                    
                    // Create resume object with ATS score
                    const resume = {
                        id: Date.now(),
                        fileName: fileName,
                        fileSize: fileData.file.size,
                        fileType: fileData.file.type,
                        uploadDate: new Date().toISOString(),
                        position: position,
                        status: 'pending',
                        dataUrl: fileData.dataUrl,
                        atsScore: atsResult.score,
                        atsFeedback: atsResult
                    };
                    
                    // Get uploads from localStorage
                    const uploads = JSON.parse(localStorage.getItem('resumeUploads') || '[]');
                    
                    // Add new upload
                    uploads.push(resume);
                    
                    // Save back to localStorage
                    localStorage.setItem('resumeUploads', JSON.stringify(uploads));
                    
                    // Remove processing message
                    document.getElementById('processing-message').remove();
                    
                    // Show ATS score modal
                    showATSScoreModal(atsResult);
                } catch (error) {
                    console.error('Error analyzing resume:', error);
                    
                    // Remove processing message if it exists
                    const processingMessage = document.getElementById('processing-message');
                    if (processingMessage) {
                        processingMessage.remove();
                    }
                    
                    // Still save the resume but without ATS score
                    const resume = {
                        id: Date.now(),
                        fileName: fileName,
                        fileSize: fileData.file.size,
                        fileType: fileData.file.type,
                        uploadDate: new Date().toISOString(),
                        position: position,
                        status: 'pending',
                        dataUrl: fileData.dataUrl
                    };
                    
                    // Get uploads from localStorage
                    const uploads = JSON.parse(localStorage.getItem('resumeUploads') || '[]');
                    
                    // Add new upload
                    uploads.push(resume);
                    
                    // Save back to localStorage
                    localStorage.setItem('resumeUploads', JSON.stringify(uploads));
                    
                    alert(`Error analyzing resume: ${error.message}. Resume uploaded without ATS analysis.`);
                }
            }
        }
    } catch (error) {
        console.error('Error processing files:', error);
        alert(`Error: ${error.message}`);
    } finally {
        // Reset button
        processButton.disabled = false;
        processButton.innerHTML = 'Process Files';
        
        // Clear the file list and temporary storage
        fileList.innerHTML = '';
        window.uploadedFiles = {};
        fileInput.value = '';
        
        // Display uploaded files
        displayUploadedFiles();
    }
});
            // Function to display uploaded files
            function displayUploadedFiles() {
                // Get or create the uploaded files section
                let uploadedSection = document.getElementById('uploaded-files-section');
                if (!uploadedSection) {
                    uploadedSection = document.createElement('div');
                    uploadedSection.id = 'uploaded-files-section';
                    uploadedSection.style.marginTop = '30px';
                    uploadedSection.innerHTML = `
                        <h3 style="margin-bottom: 15px; color: var(--accent-glow);">Your Uploaded Resumes</h3>
                        <div id="uploaded-files-list"></div>
                    `;
                    document.querySelector('.upload-container').appendChild(uploadedSection);
                }
                
                // Get the uploaded files list
                const uploadedList = document.getElementById('uploaded-files-list');
                
                // Get uploads from localStorage
                const uploads = JSON.parse(localStorage.getItem('resumeUploads') || '[]');
                
                // Clear the list
                uploadedList.innerHTML = '';
                
                if (uploads.length === 0) {
                    uploadedList.innerHTML = '<p>You have not uploaded any resumes yet.</p>';
                    return;
                }
                
                // Add each upload to the list
                uploads.forEach(upload => {
                    // Status styling
                    let statusColor = '#6c757d';
                    let statusText = 'Pending';
                    
                    if (upload.status === 'approved') {
                        statusColor = '#28a745';
                        statusText = 'Approved';
                    } else if (upload.status === 'rejected') {
                        statusColor = '#dc3545';
                        statusText = 'Rejected';
                    }
                    
                    // Format date
                    const date = new Date(upload.uploadDate);
                    const formattedDate = date.toLocaleDateString();
                    
                    const fileItem = document.createElement('div');
                    fileItem.className = 'file-item';
                    fileItem.style.marginBottom = '10px';
                    fileItem.innerHTML = `
                        <div>
                            <i class="fas fa-file-pdf"></i>
                            <span>${upload.fileName}</span>
                            <div style="margin-top: 5px; font-size: 0.8em; color: rgba(255,255,255,0.7);">
                                <span>Position: ${upload.position}</span> | 
                                <span>Uploaded: ${formattedDate}</span> | 
                                <span style="padding: 2px 8px; border-radius: 10px; background-color: ${statusColor};">${statusText}</span>
                            </div>
                        </div>
                        <div>
                           
                            <button class="remove-btn" data-id="${upload.id}">×</button>
                        </div>
                    `;
                    
                    uploadedList.appendChild(fileItem);
                });
                
                // Add view handlers
                document.querySelectorAll('#uploaded-files-list .view-pdf-button').forEach(button => {
                    button.addEventListener('click', function() {
                        const id = this.getAttribute('data-id');
                        
                        // Find the upload
                        const uploads = JSON.parse(localStorage.getItem('resumeUploads') || '[]');
                        const upload = uploads.find(u => u.id == id);
                        
                        if (upload && upload.dataUrl) {
                            // Open in new tab
                            window.open(upload.dataUrl, '_blank');
                        } else {

    // Function to extract text from PDF using PDF.js
    async function extractTextFromPDF(dataUrl) {
        return new Promise((resolve, reject) => {
            if (!pdfjsLib) {
                reject(new Error("PDF.js is not loaded"));
                return;
            }
    
            // Remove data URL prefix to get base64 data
            const loadingTask = pdfjsLib.getDocument(dataUrl);
            
            loadingTask.promise.then(async (pdf) => {
                let fullText = '';
                
                // Extract text from all pages
                for (let pageNum = 1; pageNum <= pdf.numPages; pageNum++) {
                    const page = await pdf.getPage(pageNum);
                    const textContent = await page.getTextContent();
                    
                    // Concatenate text from the page
                    const pageText = textContent.items.map(item => item.str).join(' ');
                    fullText += pageText + '\n';
                }
                
                resolve(fullText);
            }).catch(error => {
                console.error("Error extracting PDF text:", error);
                reject(error);
            });
        });
    }

    // Identify the professional domain
    identifyProfessionalDomain(resumeText) {
        const lowercaseText = resumeText.toLowerCase();
        
        // Find the domain with most keyword matches
        const domainMatches = Object.entries(this.professionalDomains).map(([domain, config]) => ({
            domain,
            matchCount: config.keywords.filter(keyword => 
                lowercaseText.includes(keyword.toLowerCase())
            ).length
        }));

        // Sort by match count and return top domain
        const topDomain = domainMatches.sort((a, b) => b.matchCount - a.matchCount)[0];
        
        return topDomain.matchCount > 0 ? topDomain.domain : 'general';
    }

    // Extract important words based on identified domain
    extractImportantWords(resumeText) {
        const domain = this.identifyProfessionalDomain(resumeText);
        
        if (domain === 'general') {
            // Generic important words if no specific domain found
            return ['professional', 'experience', 'skills', 'expertise'];
        }

        const domainKeywords = this.professionalDomains[domain].keywords;
        
        // Find matches in the resume
        const matchedKeywords = domainKeywords.filter(keyword => 
            resumeText.toLowerCase().includes(keyword.toLowerCase())
        );

        return matchedKeywords.length > 0 ? matchedKeywords : 
            domainKeywords.slice(0, 3); // Fallback to first 3 domain keywords
    }

    // Find potential improvements
    findPotentialImprovements(resumeText) {
        const domain = this.identifyProfessionalDomain(resumeText);
        
        if (domain === 'general') {
            return [
                'professional development', 
                'skill enhancement', 
                'career growth strategies'
            ];
        }

        const improvementAreas = this.professionalDomains[domain].improvementAreas;
        
        // Find keywords not in the resume
        const missingKeywords = improvementAreas.filter(keyword => 
            !resumeText.toLowerCase().includes(keyword.toLowerCase())
        );

        return missingKeywords.length > 0 ? missingKeywords : 
            improvementAreas.slice(0, 3); // Fallback to first 3 improvement areas
    }

    // Calculate resume score
    calculateResumeScore(matchedKeywords, missingKeywords) {
        const totalPossibleKeywords = 15;
        const matchScore = (matchedKeywords.length / totalPossibleKeywords) * 100;
        const missingPenalty = (missingKeywords.length / 5) * 10;
        
        return Math.max(50, Math.min(100, Math.round(matchScore - missingPenalty)));
    }

                graphicDesign: "Design portfolio requires significant creative development.",
                projectManagement: "Project management resume needs enhanced leadership demonstration.",
                general: "Professional resume requires comprehensive restructuring and skill highlighting."
            }
        };

        if (score >= 90) {
            return feedbackTemplates.highScore[domain] || feedbackTemplates.highScore.general;
        } else if (score >= 60) {
            return feedbackTemplates.mediumScore[domain] || feedbackTemplates.mediumScore.general;
        } else {
            return feedbackTemplates.lowScore[domain] || feedbackTemplates.lowScore.general;
        }
    }

    generateImprovementSuggestions(score, domain) {
        const improvementTemplates = {
            softwareDevelopment: [
                "Highlight specific programming languages and technologies",

            );

        return suggestions.join(". ");

    // Main prediction method
    async predictATSScore(resumeText) {
        // Identify professional domain
        const domain = this.identifyProfessionalDomain(resumeText);
        
        // Extract keywords
        const matchedKeywords = this.extractImportantWords(resumeText);
        const missingKeywords = this.findPotentialImprovements(resumeText);
        
        // Calculate score
        const score = this.calculateResumeScore(matchedKeywords, missingKeywords);
        
        return {
            score: score,
            domain: domain,
            feedback: this.generateFeedback(score, domain),
            keywordMatches: matchedKeywords,
            missingKeywords: missingKeywords,
            improvedContent: this.generateImprovementSuggestions(score, domain)
        };
    }

                }
            );

// Function to train the model
async function trainModelWithSampleData() {
    try {
        // Ensure ML scorer is initialized
        if (!mlATSScorer) {
            mlATSScorer = new MLATSScorer();
            await mlATSScorer.createModel();
        }
        
        console.log("Starting model training...");
        
        // Add training examples
        for (const data of trainingData) {
            const processedResume = await mlATSScorer.preprocessText(data.resumeText);
            
            // Add to training data
            mlATSScorer.trainingData.resumes.push(
                mlATSScorer.padSequence(processedResume)
            );
            mlATSScorer.trainingData.labels.push(data.isGoodMatch ? 1 : 0);
        }
        
        // Convert training data to tensors
        const xs = tf.tensor2d(mlATSScorer.trainingData.resumes);
        const ys = tf.tensor2d(mlATSScorer.trainingData.labels, [mlATSScorer.trainingData.labels.length, 1]);
        
        // Train the model with more detailed configuration
        const history = await mlATSScorer.model.fit(xs, ys, {
            epochs: 100, // Increased number of training iterations
            batchSize: 32,
            validationSplit: 0.2, // Use 20% of data for validation
            callbacks: {
                onEpochEnd: async (epoch, logs) => {
                    console.log(`Epoch ${epoch}: loss = ${logs.loss}, accuracy = ${logs.acc}`);
                }
            }
        });
        
        console.log("Model training completed successfully!");
        
        // Optional: Save model to localStorage for persistence
        await mlATSScorer.model.save('localstorage://ats-resume-model');
        
        return true;
    } catch (error) {
        console.error("Model training failed:", error);
        return false;
    }
}

// Add an event listener to train the model when the page loads
document.addEventListener('DOMContentLoaded', async () => {
    try {
        // Check if a saved model exists
        const savedModel = await tf.loadLayersModel('localstorage://ats-resume-model');
        if (savedModel) {
            console.log("Loaded saved model");
            mlATSScorer.model = savedModel;
        } else {
            // Train a new model if no saved model exists
            await trainModelWithSampleData();
        }
    } catch (error) {
        // If no saved model, train a new one
        await trainModelWithSampleData();
    }
});

async function addTrainingExample(resumeText, isGoodMatch) {
    if (!mlATSScorer) {
        console.error("ML Scorer not initialized");
        return false;
    }
    
    try {
        const processedResume = await mlATSScorer.preprocessText(resumeText);
        
        // Add new training example
        mlATSScorer.trainingData.resumes.push(
            mlATSScorer.padSequence(processedResume)
        );
        mlATSScorer.trainingData.labels.push(isGoodMatch ? 1 : 0);
        
        // Retrain the model with the new data
        const xs = tf.tensor2d(mlATSScorer.trainingData.resumes);
        const ys = tf.tensor2d(mlATSScorer.trainingData.labels, [mlATSScorer.trainingData.labels.length, 1]);
        
        await mlATSScorer.model.fit(xs, ys, {
            epochs: 50,
            batchSize: 32
        });
        
        console.log("Model updated with new training example");
        return true;
    } catch (error) {

        return false;
    }
}
